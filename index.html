<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>波乱万丈人生ゲーム</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css?v=20">
</head>
<body>

<!-- タイトル画面 -->
<div id="screen-title" class="screen">
  <div class="t-sun"></div>
  <div class="t-cloud c1"></div><div class="t-cloud c2"></div><div class="t-cloud c3"></div>
  <div class="t-hill h1"></div><div class="t-hill h2"></div>
  <div class="t-wheel"></div>
  <div class="t-road"><div class="t-car"><svg viewBox="0 0 96 54" width="96" height="54" aria-hidden="true">
    <rect x="24" y="4" width="44" height="22" rx="9" fill="#e8433e"/>
    <rect x="29" y="8" width="34" height="13" rx="5" fill="#cdeffd"/>
    <rect x="4" y="18" width="88" height="22" rx="10" fill="#e8433e"/>
    <rect x="2" y="24" width="8" height="7" rx="2.5" fill="#ffd23e"/>
    <circle cx="26" cy="42" r="10" fill="#2b2b33"/><circle cx="70" cy="42" r="10" fill="#2b2b33"/>
    <circle cx="26" cy="42" r="4" fill="#ddd"/><circle cx="70" cy="42" r="4" fill="#ddd"/>
  </svg></div></div>
  <div class="title-wrap">
    <div class="title-logo">
      <span>波</span><span>乱</span><span>万</span><span>丈</span>
    </div>
    <h1 class="title-main"><span>人</span><span>生</span><span>ゲ</span><span>ー</span><span>ム</span></h1>
    <p class="title-sub">〜 どん底と大逆転のジェットコースターライフ 〜</p>
    <div class="title-buttons">
      <button id="btn-newgame" class="btn btn-big btn-primary">はじめから</button>
      <button id="btn-continue" class="btn btn-big" hidden>続きから</button>
    </div>
    <p class="title-note">🎲 2〜6人 パス＆プレイ専用 🎲</p>
  </div>
</div>

<!-- プレイヤー設定画面 -->
<div id="screen-setup" class="screen" hidden>
  <div class="setup-wrap">
    <h2>プレイヤー設定</h2>
    <div class="setup-count">
      <span>あそぶ人数：</span>
      <div id="count-buttons"></div>
    </div>
    <div id="player-inputs"></div>
    <div class="setup-actions">
      <button id="btn-back-title" class="btn">← もどる</button>
      <button id="btn-start" class="btn btn-primary btn-big">ゲームスタート！</button>
    </div>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="screen-game" class="screen" hidden>
  <header id="game-header">
    <div class="header-title">🎲 波乱万丈人生ゲーム</div>
    <div id="header-turn"></div>
    <div class="header-actions">
      <button id="btn-drawer" class="btn btn-small">📊 資産</button>
      <button id="btn-zoom" class="btn btn-small">🗺️ 全体マップ</button>
      <button id="btn-sound" class="btn btn-small">♪ ON</button>
      <button id="btn-quit" class="btn btn-small">中断</button>
    </div>
  </header>
  <div id="game-main">
    <div id="board-area">
      <svg id="board-svg" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="money-hud" hidden></div>
      <div id="action-bar" hidden>
        <button id="btn-assets" class="btn">🎒 カード・資産</button>
        <button id="btn-spin" class="btn btn-primary btn-big">🎡 ルーレットを回す！</button>
      </div>
      <div id="move-banner" hidden></div>
      <div id="toast-area"></div>
    </div>
    <aside id="sidebar">
      <div id="bank-badge">🏦 じんせい銀行</div>
      <div id="player-panels"></div>
      <div id="stock-ticker"></div>
      <div id="log-box"><div id="log-list"></div></div>
    </aside>
  </div>
  <!-- スマホ：ドロワー（サイドバー）の背景。タップで閉じる -->
  <div id="drawer-backdrop"></div>
</div>

<!-- 結果画面 -->
<div id="screen-result" class="screen" hidden>
  <div class="result-wrap">
    <h2>🏆 結果発表 🏆</h2>
    <div id="result-list"></div>
    <button id="btn-to-title" class="btn btn-big btn-primary">タイトルへ</button>
  </div>
</div>

<!-- 手番交代オーバーレイ -->
<div id="overlay-handoff" class="overlay" hidden>
  <div id="handoff-box">
    <div id="handoff-label">─ つぎの番 ─</div>
    <div id="handoff-name"></div>
    <div id="handoff-info"></div>
    <button id="btn-handoff-go" class="btn btn-big btn-primary">スタート！</button>
  </div>
</div>

<!-- ルーレットオーバーレイ -->
<div id="overlay-roulette" class="overlay" hidden>
  <div class="roulette-box">
    <div id="roulette-label"></div>
    <svg id="roulette-svg" viewBox="-130 -160 260 300"></svg>
    <div id="roulette-result" hidden></div>
    <div id="roulette-hint"></div>
    <button id="btn-do-spin" class="btn btn-big btn-primary">回す！</button>
  </div>
</div>

<!-- 全体マップ俯瞰トグル（どんな状態でも最前面・オーバーレイ越しに盤面を確認） -->
<button id="btn-map-peek" class="btn" hidden>🗺️ 全体</button>

<!-- 汎用モーダル -->
<div id="overlay-modal" class="overlay" hidden>
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-body"></div>
    <div id="modal-buttons"></div>
  </div>
</div>

<script src="js/data-cards.js?v=20"></script>
<script src="js/player.js?v=20"></script>
<script src="js/data-board.js?v=20"></script>
<script src="js/icons.js?v=20"></script>
<script src="js/scenery.js?v=20"></script>
<script src="js/sound.js?v=20"></script>
<script src="js/bgm.js?v=20"></script>
<script src="js/fx.js?v=20"></script>
<script src="js/roulette.js?v=20"></script>
<script src="js/board.js?v=20"></script>
<script src="js/ui.js?v=20"></script>
<script src="js/casino.js?v=20"></script>
<script src="js/game.js?v=20"></script>
<script src="js/main.js?v=20"></script>
</body>
</html>
